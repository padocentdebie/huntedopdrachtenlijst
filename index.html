<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Missiecoördinaten Overzicht</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #0a0e17; color: #e0e0e0; }
    #map { height: 600px; width: 100%; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>📌 Alle missiecoördinaten</h1>
  <div id="map"></div>
  <script>
    const missions = [
      { id: 1, lat: 52.131168, lng: 5.365757, desc: "Handlanger oppikken" },
      { id: 2, lat: 52.131605, lng: 5.368394, desc: "Vluchtvoertuig kiezen" },
      { id: 3, lat: 52.130893, lng: 5.364418, desc: "Vuurwapen tonen" },
      { id: 4, lat: 52.132714, lng: 5.368064, desc: "Ongeluk fotograferen" },
      { id: 5, lat: 52.131170, lng: 5.366998, desc: "Documenten controleren" },
      { id: 6, lat: 52.131334, lng: 5.366343, desc: "Verbergplek beoordelen" },
      { id: 7, lat: 52.131500, lng: 5.366800, desc: "Contactpersoon ontmoeten" },
      { id: 8, lat: 52.130000, lng: 5.367000, desc: "Schuilplaats zoeken" },
      { id: 9, lat: 52.132000, lng: 5.365000, desc: "Sporen uitwissen" },
      { id: 10, lat: 52.131800, lng: 5.368500, desc: "Geheime code tonen" },
      { id: 11, lat: 52.130500, lng: 5.365500, desc: "Wacht omkopen" },
      { id: 12, lat: 52.131000, lng: 5.367500, desc: "Documenten overhandigen" },
      { id: 13, lat: 52.132500, lng: 5.366500, desc: "Loyaliteit tonen" },
      { id: 14, lat: 52.130800, lng: 5.368200, desc: "Helikopter ontsnapping" }
    ];

    const map = L.map('map').setView([52.131, 5.367], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    missions.forEach(m => {
      L.marker([m.lat, m.lng])
        .bindPopup(`<strong>Missie ${m.id}</strong><br>${m.desc}<br>${m.lat}, ${m.lng}`)
        .addTo(map);
    });
  </script>
</body>
</html>
