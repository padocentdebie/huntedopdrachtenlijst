<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missiecoördinaten - sleepbaar en bewerkbaar</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      color: #f0c040;
      margin-bottom: 10px;
    }
    #map {
      height: 600px;
      border-radius: 8px;
      background: #0d1624;
      margin-bottom: 20px;
    }
    .coord-list {
      background: #1a2332;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #2a3a4a;
    }
    .coord-list h2 {
      color: #88ccff;
      margin-top: 0;
    }
    .coord-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a3a4a;
    }
    .coord-item:last-child {
      border-bottom: none;
    }
    .coord-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .coord-id {
      color: #8899aa;
      width: 60px;
    }
    .coord-coords {
      color: #e0e0e0;
      font-family: monospace;
    }
    .coord-textarea {
      width: 100%;
      background: #0d1624;
      border: 1px solid #2a3a4a;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      margin-top: 4px;
    }
    .coord-textarea:focus {
      border-color: #4a90d9;
      outline: none;
    }
    .coord-label {
      font-size: 0.75rem;
      color: #8899aa;
      display: block;
      margin-top: 4px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .btn {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .btn:hover {
      background: #357abd;
    }
    .btn-secondary {
      background: #6c7a89;
    }
    .btn-secondary:hover {
      background: #5a6775;
    }
    .btn-success {
      background: #28a745;
    }
    .btn-success:hover {
      background: #218838;
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #c82333;
    }
    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #8899aa;
    }
    .leaflet-control-attribution {
      color: #667788 !important;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📌 Missiecoördinaten - sleep de pinnen & bewerk teksten</h1>
  <p style="color: #8899aa; margin-bottom: 16px;">
    Sleep de markers naar de gewenste locaties. Bewerk de OC‑melding, opdrachtteksten en het spoor per locatie.
    <strong>Alle wijzigingen worden live opgeslagen in Firebase!</strong>
  </p>

  <div id="map"></div>

  <div class="coord-list">
    <h2>📋 Missies (bewerkbaar)</h2>
    <div id="coordContainer"></div>
    <div class="btn-group">
      <button class="btn btn-success" id="addBtn">➕ Nieuwe missie toevoegen</button>
      <button class="btn btn-danger" id="resetBtn">🔄 Reset naar standaard</button>
      <button class="btn" id="copyBtn">📋 Kopieer JSON</button>
      <button class="btn btn-secondary" id="downloadBtn">💾 Download JSON</button>
    </div>
    <div id="status" class="status"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB12mTMBnuxdC4W4htyFO_C7Dnh3maVKew",
    authDomain: "decoroefening.firebaseapp.com",
    databaseURL: "https://decoroefening-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "decoroefening",
    storageBucket: "decoroefening.firebasestorage.app",
    messagingSenderId: "945998495824",
    appId: "1:945998495824:web:a76dc7519b3b262a021155"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const MISSIONS_PATH = 'master/missions';

  // ===== DE 14 STANDAARD MISSIES =====
  const DEFAULT_MISSIONS = [
    {
      "id": "mission1",
      "order": 1,
      "lat": 52.131168,
      "lng": 5.365757,
      "cryptic": "OC-melding: Handlanger opgepikt, bewijs van ontmoeting vereist.",
      "description": "Godfather: Pik de handlanger op. Hij mag de grond niet raken. Maak een foto voor de schuilplaats.",
      "spoor": ""
    },
    {
      "id": "mission2",
      "order": 2,
      "lat": 52.131605,
      "lng": 5.368394,
      "cryptic": "OC-melding: Vluchtvoertuig geselecteerd, foto met voertuig vereist.",
      "description": "Godfather: Kies een vluchtauto en maak een foto met de handlanger en het voertuig.",
      "spoor": ""
    },
    {
      "id": "mission3",
      "order": 3,
      "lat": 52.130893,
      "lng": 5.364418,
      "cryptic": "OC-melding: Handlanger toont vuurwapen, onhandig gedrag gesignaleerd.",
      "description": "Godfather: Laat de handlanger met een wapen zien – hij is er niet handig mee.",
      "spoor": ""
    },
    {
      "id": "mission4",
      "order": 4,
      "lat": 52.132714,
      "lng": 5.368064,
      "cryptic": "OC-melding: Ongeluk veroorzaakt door vlucht, foto van schade vereist.",
      "description": "Godfather: Maak een foto van het ongeluk dat jullie hebben veroorzaakt.",
      "spoor": ""
    },
    {
      "id": "mission5",
      "order": 5,
      "lat": 52.13117,
      "lng": 5.366998,
      "cryptic": "OC-melding: Geheime documenten worden gecontroleerd.",
      "description": "Godfather: Controleer de documenten en maak een foto van de handlanger die ze checkt.",
      "spoor": ""
    },
    {
      "id": "mission6",
      "order": 6,
      "lat": 52.131334,
      "lng": 5.366343,
      "cryptic": "OC-melding: Verbergplek voor documenten wordt geïnspecteerd.",
      "description": "Godfather: Is dit een goede schuilplek? Maak een foto.",
      "spoor": ""
    },
    {
      "id": "mission7",
      "order": 7,
      "lat": 52.1315,
      "lng": 5.3668,
      "cryptic": "OC-melding: Contactpersoon ontmoet, foto van ontmoeting vereist.",
      "description": "Godfather: Neem contact op met de persoon en maak een foto van de ontmoeting.",
      "spoor": "Persoon plaatsnemen in oefenwoning"
    },
    {
      "id": "mission8",
      "order": 8,
      "lat": 52.13,
      "lng": 5.367,
      "cryptic": "OC-melding: Schuilplaats voor de nacht wordt gezocht.",
      "description": "Godfather: Zoek een schuilplaats voor de nacht en maak een foto.",
      "spoor": ""
    },
    {
      "id": "mission9",
      "order": 9,
      "lat": 52.132,
      "lng": 5.365,
      "cryptic": "OC-melding: Sporen worden uitgewist, foto van de weg vereist.",
      "description": "Godfather: Wis jullie sporen en maak een foto van de afgelegde weg.",
      "spoor": ""
    },
    {
      "id": "mission10",
      "order": 10,
      "lat": 52.1318,
      "lng": 5.3685,
      "cryptic": "OC-melding: Geheime code wordt onthouden, foto van code vereist.",
      "description": "Godfather: Laat de handlanger een code onthouden en maak een foto van de code.",
      "spoor": ""
    },
    {
      "id": "mission11",
      "order": 11,
      "lat": 52.1305,
      "lng": 5.3655,
      "cryptic": "OC-melding: Checkpoint, omkoping van de wacht vastgelegd.",
      "description": "Godfather: Koop de wacht om en maak een foto van de omkoping.",
      "spoor": ""
    },
    {
      "id": "mission12",
      "order": 12,
      "lat": 52.131,
      "lng": 5.3675,
      "cryptic": "OC-melding: Documenten worden overhandigd aan opdrachtgever.",
      "description": "Godfather: Overhandig de documenten en maak een foto van de overhandiging.",
      "spoor": ""
    },
    {
      "id": "mission13",
      "order": 13,
      "lat": 52.1325,
      "lng": 5.3665,
      "cryptic": "OC-melding: Loyaliteit getoond met wapen, foto vereist.",
      "description": "Godfather: Toon loyaliteit met een wapen en maak een foto.",
      "spoor": ""
    },
    {
      "id": "mission14",
      "order": 14,
      "lat": 52.1308,
      "lng": 5.3682,
      "cryptic": "OC-melding: Ontsnapping per helikopter, foto van helikopter vereist.",
      "description": "Godfather: Ontsnap per helikopter en maak een foto van de helikopter.",
      "spoor": ""
    }
  ];

  // ===== GLOBALE STATE =====
  let missions = [];
  let markers = [];
  let map;
  let coordElements = []; // nog steeds nodig voor tekstvelden, maar niet voor coördinaten
  let isUpdatingFromFirebase = false;

  // ===== FIREBASE =====
  function loadFromFirebase() {
    const missionsRef = ref(db, MISSIONS_PATH);
    onValue(missionsRef, (snapshot) => {
      if (isUpdatingFromFirebase) return;
      const data = snapshot.val();
      if (data && Array.isArray(data) && data.length > 0) {
        const existingIds = new Set(data.map(m => m.id));
        const missing = DEFAULT_MISSIONS.filter(m => !existingIds.has(m.id));
        if (missing.length > 0) {
          missions = [...data, ...missing];
          missions.sort((a,b) => a.order - b.order);
          set(missionsRef, missions);
        } else {
          missions = data;
        }
      } else {
        missions = DEFAULT_MISSIONS.map(m => ({ ...m }));
        set(missionsRef, missions);
      }
      updateUIFromData();
      document.getElementById('status').textContent = '📂 Missies geladen uit Firebase.';
    });
  }

  function saveToFirebase() {
    if (isUpdatingFromFirebase) return;
    set(ref(db, MISSIONS_PATH), missions);
  }

  // ===== UI BIJWERKEN ZONDER DOM TE VERVANGEN =====
  function updateUIFromData() {
    const container = document.getElementById('coordContainer');
    if (container.children.length === 0) {
      buildAllCoordItems();
      updateAllMarkers();
      return;
    }
    for (let i = 0; i < missions.length; i++) {
      const m = missions[i];
      const el = coordElements[i];
      if (el) {
        // Coördinaten bijwerken via ID
        const coordSpan = document.getElementById(`coord-${i}`);
        if (coordSpan) coordSpan.textContent = `${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}`;
        // Tekstvelden alleen bijwerken als de waarde veranderd is (voorkomt cursorverlies)
        if (el.crypticTA.value !== m.cryptic) el.crypticTA.value = m.cryptic;
        if (el.descTA.value !== m.description) el.descTA.value = m.description;
        if (el.spoorTA.value !== (m.spoor || '')) el.spoorTA.value = m.spoor || '';
        if (markers[i]) markers[i].bindPopup(getPopupContent(m));
      }
    }
    // Nieuwe items toevoegen als die er zijn
    for (let i = coordElements.length; i < missions.length; i++) {
      appendCoordItem(i);
      addMarker(i);
    }
  }

  // ===== KAART =====
  function initMap() {
    map = L.map('map').setView([52.131, 5.367], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
  }

  function getPopupContent(m) {
    return `
      <strong>Missie ${m.order}</strong><br>
      <strong>OC‑melding:</strong> ${m.cryptic}<br>
      <strong>Opdracht:</strong> ${m.description}<br>
      <strong>Spoor:</strong> ${m.spoor || '—'}<br>
      <span style="font-family:monospace;">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
    `;
  }

  function updateAllMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    for (let i = 0; i < missions.length; i++) {
      addMarker(i);
    }
  }

  function addMarker(index) {
    const m = missions[index];
    const marker = L.marker([m.lat, m.lng], { draggable: true, autoPan: true }).addTo(map);
    marker.bindPopup(getPopupContent(m));
    marker.on('dragend', function() {
      const pos = marker.getLatLng();
      m.lat = pos.lat;
      m.lng = pos.lng;
      saveToFirebase();
      updateCoordDisplay(index);
      document.getElementById('status').textContent = '📍 Coördinaten bijgewerkt en opgeslagen.';
    });
    markers[index] = marker;
    return marker;
  }

  function updateMarkerPopup(index) {
    const m = missions[index];
    const marker = markers[index];
    if (marker) marker.bindPopup(getPopupContent(m));
  }

  // ===== GECORRIGEERDE updateCoordDisplay =====
  function updateCoordDisplay(index) {
    const m = missions[index];
    const coordSpan = document.getElementById(`coord-${index}`);
    if (coordSpan) {
      coordSpan.textContent = `${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}`;
    }
  }

  // ===== DOM: LIJST (eenmalig bouwen) =====
  function buildAllCoordItems() {
    const container = document.getElementById('coordContainer');
    container.innerHTML = '';
    coordElements = [];
    for (let i = 0; i < missions.length; i++) {
      appendCoordItem(i);
    }
  }

  function appendCoordItem(index) {
    const container = document.getElementById('coordContainer');
    const m = missions[index];
    const div = document.createElement('div');
    div.className = 'coord-item';
    div.dataset.index = index;

    div.innerHTML = `
      <div class="coord-header">
        <span class="coord-id">#${m.order}</span>
        <span class="coord-coords" id="coord-${index}">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
      </div>
      <label class="coord-label">🔐 OC‑melding</label>
      <textarea class="coord-textarea cryptic-input" rows="2" id="cryptic-${index}">${m.cryptic}</textarea>
      <label class="coord-label">📋 Opdrachtbeschrijving</label>
      <textarea class="coord-textarea desc-input" rows="3" id="desc-${index}">${m.description}</textarea>
      <label class="coord-label">🧩 Spoor / materiaal</label>
      <textarea class="coord-textarea spoor-input" rows="2" id="spoor-${index}">${m.spoor || ''}</textarea>
    `;

    container.appendChild(div);

    const coordsSpan = document.getElementById(`coord-${index}`);
    const crypticTA = document.getElementById(`cryptic-${index}`);
    const descTA = document.getElementById(`desc-${index}`);
    const spoorTA = document.getElementById(`spoor-${index}`);
    coordElements[index] = { coordsSpan, crypticTA, descTA, spoorTA };

    crypticTA.addEventListener('input', function() {
      if (isUpdatingFromFirebase) return;
      missions[index].cryptic = this.value;
      updateMarkerPopup(index);
      saveToFirebase();
      document.getElementById('status').textContent = '🔐 OC‑melding bijgewerkt.';
    });
    descTA.addEventListener('input', function() {
      if (isUpdatingFromFirebase) return;
      missions[index].description = this.value;
      updateMarkerPopup(index);
      saveToFirebase();
      document.getElementById('status').textContent = '📋 Opdracht bijgewerkt.';
    });
    spoorTA.addEventListener('input', function() {
      if (isUpdatingFromFirebase) return;
      missions[index].spoor = this.value;
      updateMarkerPopup(index);
      saveToFirebase();
      document.getElementById('status').textContent = '🧩 Spoor bijgewerkt.';
    });
  }

  // ===== NIEUWE MISSIE TOEVOEGEN =====
  function addNewMission() {
    let maxOrder = 0;
    let maxIdNum = 0;
    missions.forEach(m => {
      if (m.order > maxOrder) maxOrder = m.order;
      const num = parseInt(m.id.replace('mission', ''));
      if (!isNaN(num) && num > maxIdNum) maxIdNum = num;
    });
    const newOrder = maxOrder + 1;
    const newId = `mission${maxIdNum + 1}`;

    const center = map.getCenter();
    const newMission = {
      id: newId,
      order: newOrder,
      lat: center.lat,
      lng: center.lng,
      cryptic: "OC-melding: (nieuwe missie)",
      description: "Godfather: (nieuwe opdracht)",
      spoor: ""
    };

    missions.push(newMission);
    const newIndex = missions.length - 1;
    appendCoordItem(newIndex);
    addMarker(newIndex);
    saveToFirebase();
    document.getElementById('status').textContent = `✅ Nieuwe missie ${newId} toegevoegd.`;
  }

  // ===== RESET =====
  function resetToDefault() {
    if (confirm('Weet je zeker dat je alle missies wilt resetten naar de standaard 14? Alle huidige wijzigingen gaan verloren!')) {
      isUpdatingFromFirebase = true;
      missions = DEFAULT_MISSIONS.map(m => ({ ...m }));
      saveToFirebase();
      updateUIFromData();
      isUpdatingFromFirebase = false;
      document.getElementById('status').textContent = '🔄 Gereset naar de 14 standaardmissies.';
    }
  }

  // ===== EXPORT =====
  function getCurrentJSON() {
    return JSON.stringify(missions, null, 2);
  }

  // ===== START =====
  document.addEventListener('DOMContentLoaded', function() {
    initMap();
    loadFromFirebase();

    document.getElementById('addBtn').addEventListener('click', addNewMission);
    document.getElementById('resetBtn').addEventListener('click', resetToDefault);

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const json = getCurrentJSON();
      try {
        await navigator.clipboard.writeText(json);
        document.getElementById('status').textContent = '✅ JSON gekopieerd naar klembord!';
      } catch {
        const ta = document.createElement('textarea');
        ta.value = json;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        document.getElementById('status').textContent = '✅ JSON gekopieerd!';
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      const json = getCurrentJSON();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'missies.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      document.getElementById('status').textContent = '💾 JSON-bestand gedownload!';
    });
  });
</script>
</body>
</html>
