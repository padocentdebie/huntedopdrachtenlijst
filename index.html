<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missiecoördinaten - sleepbaar en bewerkbaar</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      color: #f0c040;
      margin-bottom: 10px;
    }
    #map {
      height: 600px;
      border-radius: 8px;
      background: #0d1624;
      margin-bottom: 20px;
    }
    .coord-list {
      background: #1a2332;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #2a3a4a;
    }
    .coord-list h2 {
      color: #88ccff;
      margin-top: 0;
    }
    .coord-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a3a4a;
    }
    .coord-item:last-child {
      border-bottom: none;
    }
    .coord-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .coord-id {
      color: #8899aa;
      width: 60px;
    }
    .coord-coords {
      color: #e0e0e0;
      font-family: monospace;
    }
    .coord-textarea {
      width: 100%;
      background: #0d1624;
      border: 1px solid #2a3a4a;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      margin-top: 4px;
    }
    .coord-textarea:focus {
      border-color: #4a90d9;
      outline: none;
    }
    .coord-label {
      font-size: 0.75rem;
      color: #8899aa;
      display: block;
      margin-top: 4px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .btn {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .btn:hover {
      background: #357abd;
    }
    .btn-secondary {
      background: #6c7a89;
    }
    .btn-secondary:hover {
      background: #5a6775;
    }
    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #8899aa;
    }
    .leaflet-control-attribution {
      color: #667788 !important;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📌 Missiecoördinaten - sleep de pinnen & bewerk teksten</h1>
  <p style="color: #8899aa; margin-bottom: 16px;">
    Sleep de markers naar de gewenste locaties. Bewerk de OC‑melding, opdrachtteksten en het spoor per locatie.
    <strong>Alle wijzigingen worden live opgeslagen in Firebase!</strong>
  </p>

  <div id="map"></div>

  <div class="coord-list">
    <h2>📋 Missies (bewerkbaar)</h2>
    <div id="coordContainer"></div>
    <div class="btn-group">
      <button class="btn" id="copyBtn">📋 Kopieer JSON</button>
      <button class="btn btn-secondary" id="downloadBtn">💾 Download JSON</button>
    </div>
    <div id="status" class="status"></div>
  </div>
</div>

<script type="module">
  // ============================================================
  // IMPORTS & FIREBASE
  // ============================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB12mTMBnuxdC4W4htyFO_C7Dnh3maVKew",
    authDomain: "decoroefening.firebaseapp.com",
    databaseURL: "https://decoroefening-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "decoroefening",
    storageBucket: "decoroefening.firebasestorage.app",
    messagingSenderId: "945998495824",
    appId: "1:945998495824:web:a76dc7519b3b262a021155"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const MISSIONS_PATH = 'master/missions';

  // ============================================================
  // INITIËLE MISSIES (fallback)
  // ============================================================
  const initialMissions = [
    {
      "id": "mission1",
      "order": 1,
      "lat": 52.131168,
      "lng": 5.365757,
      "cryptic": "OC-melding: Handlanger opgepikt, bewijs van ontmoeting vereist.",
      "description": "Godfather: Pik de handlanger op. Hij mag de grond niet raken. Maak een foto voor de schuilplaats.",
      "spoor": ""
    },
    // ... (alle 14 missies zoals eerder, we laten ze hier volledig staan maar in de code)
    // We korten af voor de duidelijkheid, maar gebruik de volledige lijst uit je eerdere bericht.
  ];

  // ============================================================
  // GLOBALE STATE
  // ============================================================
  let missions = [];
  let markers = [];
  let map;
  let coordElements = []; // bewaar per index de DOM-elementen: { coordsSpan, crypticTA, descTA, spoorTA }

  // ============================================================
  // FIREBASE: LADEN & OPSLAAN
  // ============================================================
  function loadFromFirebase() {
    const missionsRef = ref(db, MISSIONS_PATH);
    onValue(missionsRef, (snapshot) => {
      const data = snapshot.val();
      if (data && Array.isArray(data) && data.length === initialMissions.length) {
        missions = data;
      } else if (data && Array.isArray(data)) {
        missions = initialMissions.map(m => ({ ...m }));
        set(missionsRef, missions);
      } else {
        missions = initialMissions.map(m => ({ ...m }));
        set(missionsRef, missions);
      }
      // bouw de lijst en markers
      buildCoordList();
      updateMarkers();
      document.getElementById('status').textContent = '📂 Missies geladen uit Firebase.';
    });
  }

  function saveToFirebase() {
    const missionsRef = ref(db, MISSIONS_PATH);
    set(missionsRef, missions);
  }

  // ============================================================
  // KAART & MARKERS
  // ============================================================
  function initMap() {
    map = L.map('map').setView([52.131, 5.367], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
  }

  function getPopupContent(m) {
    return `
      <strong>Missie ${m.order}</strong><br>
      <strong>OC‑melding:</strong> ${m.cryptic}<br>
      <strong>Opdracht:</strong> ${m.description}<br>
      <strong>Spoor:</strong> ${m.spoor || '—'}<br>
      <span style="font-family:monospace;">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
    `;
  }

  function updateMarkers() {
    // verwijder oude markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    // maak nieuwe markers
    for (let i = 0; i < missions.length; i++) {
      const m = missions[i];
      const marker = L.marker([m.lat, m.lng], { draggable: true, autoPan: true }).addTo(map);
      marker.bindPopup(getPopupContent(m));
      marker.on('dragend', function() {
        const pos = marker.getLatLng();
        m.lat = pos.lat;
        m.lng = pos.lng;
        saveToFirebase();
        updateCoordDisplay(i);
        document.getElementById('status').textContent = '📍 Coördinaten bijgewerkt en opgeslagen.';
      });
      markers.push(marker);
    }
  }

  function updateMarkerPopup(index) {
    const m = missions[index];
    const marker = markers[index];
    if (marker) {
      marker.bindPopup(getPopupContent(m));
    }
  }

  // ============================================================
  // LIJST MET BEWERKBARE VELDEN (eenmalig bouwen)
  // ============================================================
  function buildCoordList() {
    const container = document.getElementById('coordContainer');
    let html = '';
    for (let i = 0; i < missions.length; i++) {
      const m = missions[i];
      html += `
        <div class="coord-item" data-index="${i}">
          <div class="coord-header">
            <span class="coord-id">#${m.order}</span>
            <span class="coord-coords" id="coord-${i}">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
          </div>
          <label class="coord-label">🔐 OC‑melding</label>
          <textarea class="coord-textarea cryptic-input" rows="2" id="cryptic-${i}">${m.cryptic}</textarea>
          <label class="coord-label">📋 Opdrachtbeschrijving</label>
          <textarea class="coord-textarea desc-input" rows="3" id="desc-${i}">${m.description}</textarea>
          <label class="coord-label">🧩 Spoor / materiaal</label>
          <textarea class="coord-textarea spoor-input" rows="2" id="spoor-${i}">${m.spoor || ''}</textarea>
        </div>
      `;
    }
    container.innerHTML = html;

    // Bewaar referenties naar de elementen
    coordElements = [];
    for (let i = 0; i < missions.length; i++) {
      const coordsSpan = document.getElementById(`coord-${i}`);
      const crypticTA = document.getElementById(`cryptic-${i}`);
      const descTA = document.getElementById(`desc-${i}`);
      const spoorTA = document.getElementById(`spoor-${i}`);
      coordElements[i] = { coordsSpan, crypticTA, descTA, spoorTA };

      // Koppel events
      crypticTA.addEventListener('input', function() {
        missions[i].cryptic = this.value;
        updateMarkerPopup(i);
        saveToFirebase();
        document.getElementById('status').textContent = '🔐 OC‑melding bijgewerkt.';
      });
      descTA.addEventListener('input', function() {
        missions[i].description = this.value;
        updateMarkerPopup(i);
        saveToFirebase();
        document.getElementById('status').textContent = '📋 Opdracht bijgewerkt.';
      });
      spoorTA.addEventListener('input', function() {
        missions[i].spoor = this.value;
        updateMarkerPopup(i);
        saveToFirebase();
        document.getElementById('status').textContent = '🧩 Spoor bijgewerkt.';
      });
    }
  }

  // Update alleen de coördinatenweergave bij een specifieke index
  function updateCoordDisplay(index) {
    const m = missions[index];
    const el = coordElements[index];
    if (el && el.coordsSpan) {
      el.coordsSpan.textContent = `${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}`;
    }
  }

  // ============================================================
  // HULP: JSON EXPORT
  // ============================================================
  function getCurrentJSON() {
    return JSON.stringify(missions, null, 2);
  }

  // ============================================================
  // START
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    initMap();
    loadFromFirebase();

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const json = getCurrentJSON();
      try {
        await navigator.clipboard.writeText(json);
        document.getElementById('status').textContent = '✅ JSON gekopieerd naar klembord!';
      } catch {
        const ta = document.createElement('textarea');
        ta.value = json;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        document.getElementById('status').textContent = '✅ JSON gekopieerd!';
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      const json = getCurrentJSON();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'missies.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      document.getElementById('status').textContent = '💾 JSON-bestand gedownload!';
    });
  });
</script>
</body>
</html>
