<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missiecoördinaten - sleepbaar en bewerkbaar</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      color: #f0c040;
      margin-bottom: 10px;
    }
    #map {
      height: 600px;
      border-radius: 8px;
      background: #0d1624;
      margin-bottom: 20px;
    }
    .coord-list {
      background: #1a2332;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #2a3a4a;
    }
    .coord-list h2 {
      color: #88ccff;
      margin-top: 0;
    }
    .coord-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a3a4a;
    }
    .coord-item:last-child {
      border-bottom: none;
    }
    .coord-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .coord-id {
      color: #8899aa;
      width: 60px;
    }
    .coord-coords {
      color: #e0e0e0;
      font-family: monospace;
    }
    .coord-textarea {
      width: 100%;
      background: #0d1624;
      border: 1px solid #2a3a4a;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      margin-top: 4px;
    }
    .coord-textarea:focus {
      border-color: #4a90d9;
      outline: none;
    }
    .coord-label {
      font-size: 0.75rem;
      color: #8899aa;
      display: block;
      margin-top: 4px;
    }
    .copy-btn {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
    }
    .copy-btn:hover {
      background: #357abd;
    }
    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #8899aa;
    }
    .leaflet-control-attribution {
      color: #667788 !important;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📌 Missiecoördinaten - sleep de pinnen & bewerk teksten</h1>
  <p style="color: #8899aa; margin-bottom: 16px;">Sleep de markers naar de gewenste locaties. Bewerk de cryptische omschrijving en opdrachtteksten in de lijst.</p>

  <div id="map"></div>

  <div class="coord-list">
    <h2>📋 Missies (bewerkbaar)</h2>
    <div id="coordContainer"></div>
    <button class="copy-btn" id="copyBtn">📋 Kopieer JSON naar klembord</button>
    <div id="status" class="status"></div>
  </div>
</div>

<script>
  // ----- Initieel de 14 missies -----
  const initialMissions = [
    { id: "mission1", order: 1, lat: 52.131168, lng: 5.365757, cryptic: "Er is een handlanger die op de criminelen wacht. Zorg dat hij de aarde niet raakt. Bewijs van hun ontmoeting is vereist.", description: "Pik hier jullie handlanger op. De handlanger mag onder geen enkele voorwaarde, tijdens jullie actie, de grond raken. Maak een foto van jullie team, met handlanger voor de schuilplaats van de handlanger." },
    { id: "mission2", order: 2, lat: 52.131605, lng: 5.368394, cryptic: "De criminelen hebben een vluchtvoertuig nodig. Kies er één uit en maak een foto met de handlanger en het voertuig.", description: "Zoek hier een geschikt vluchtvoertuig uit. Maak een foto met jullie handlanger en het voertuig." },
    { id: "mission3", order: 3, lat: 52.130893, lng: 5.364418, cryptic: "De handlanger moet laten zien dat hij met een vuurwapen kan omgaan. Een foto van de handlanger met een vuurwapen is vereist.", description: "Jullie zijn vuurwapengevaarlijk. Laat zien dat jullie handlanger niet erg handig is met een vuurwapen." },
    { id: "mission4", order: 4, lat: 52.132714, lng: 5.368064, cryptic: "De vlucht van de criminelen heeft een ongeluk veroorzaakt. De hunters moeten een foto van de schade zien.", description: "Jullie vluchtgedrag is erg gevaarlijk! Maak een foto van het ongeluk dat jullie veroorzaakten." },
    { id: "mission5", order: 5, lat: 52.131170, lng: 5.366998, cryptic: "De geheime documenten liggen op een bepaalde plek. De handlanger moet ze controleren.", description: "Hier liggen de geheime documenten. Deze documenten moeten jullie hebben! Maak een foto dat jullie handlanger de documenten checkt." },
    { id: "mission6", order: 6, lat: 52.131334, lng: 5.366343, cryptic: "Is dit een geschikte plek om de documenten te verbergen? Laat de hunters een foto zien.", description: "Is dit een geschikte plek om de documenten te verbergen? Maak een foto." },
    { id: "mission7", order: 7, lat: 52.131500, lng: 5.366800, cryptic: "De handlanger moet contact opnemen met een persoon. Een foto van de ontmoeting is vereist.", description: "De handlanger heeft een contactpersoon. Maak een foto van de ontmoeting." },
    { id: "mission8", order: 8, lat: 52.130000, lng: 5.367000, cryptic: "De criminelen hebben een schuilplaats nodig voor de nacht. Laat de hunters de schuilplaats zien.", description: "Zoek een schuilplaats voor de nacht. Maak een foto van de schuilplaats." },
    { id: "mission9", order: 9, lat: 52.132000, lng: 5.365000, cryptic: "De achtervolging is ingezet. De criminelen moeten sporen uitwissen. Een foto van de afgelegde weg is vereist.", description: "De achtervolging is ingezet. Zorg dat jullie sporen uitwissen. Maak een foto van de weg die jullie hebben afgelegd." },
    { id: "mission10", order: 10, lat: 52.131800, lng: 5.368500, cryptic: "De documenten bevatten geheime codes. De handlanger moet een code onthouden. Laat de hunters de code zien.", description: "De documenten bevatten geheime codes. Laat de handlanger een code onthouden. Maak een foto van de code." },
    { id: "mission11", order: 11, lat: 52.130500, lng: 5.365500, cryptic: "Er is een checkpoint. De handlanger moet de wacht omkopen. Een foto van de omkoping is vereist.", description: "Er is een checkpoint. Laat de handlanger de wacht omkopen. Maak een foto van de omkoping." },
    { id: "mission12", order: 12, lat: 52.131000, lng: 5.367500, cryptic: "De documenten moeten worden overhandigd aan de opdrachtgever. Een foto van de overhandiging is vereist.", description: "Jullie moeten de documenten overhandigen aan de opdrachtgever. Maak een foto van de overhandiging." },
    { id: "mission13", order: 13, lat: 52.132500, lng: 5.366500, cryptic: "De opdrachtgever wil een teken van loyaliteit. Laat de handlanger met een wapen zien.", description: "De opdrachtgever wil een teken van jullie loyaliteit. Maak een foto van jullie team met een wapen." },
    { id: "mission14", order: 14, lat: 52.130800, lng: 5.368200, cryptic: "De ontsnapping per helikopter is de laatste stap. Een foto van de helikopter is vereist.", description: "Einddoel: ontsnapping per helikopter. Maak een foto van de helikopter." }
  ];

  // Kopieer de missies zodat we ze kunnen wijzigen
  let missions = initialMissions.map(m => ({ ...m }));

  // ----- Kaart initialiseren -----
  const map = L.map('map').setView([52.131, 5.367], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ----- Markers aanmaken (draggable) -----
  const markers = [];

  function createMarker(m, index) {
    const marker = L.marker([m.lat, m.lng], {
      draggable: true,
      autoPan: true
    }).addTo(map);

    // Popup met missie-informatie
    const popupContent = `
      <strong>Missie ${m.order}</strong><br>
      <strong>Cryptisch:</strong> ${m.cryptic}<br>
      <strong>Opdracht:</strong> ${m.description}<br>
      <span style="font-family:monospace;">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
    `;
    marker.bindPopup(popupContent);

    // Drag-event: update coördinaten
    marker.on('dragend', function(e) {
      const newLatLng = marker.getLatLng();
      m.lat = newLatLng.lat;
      m.lng = newLatLng.lng;
      // Update popup content
      updatePopup(marker, m);
      // Update de lijst (alleen coördinaten)
      updateCoordList();
      document.getElementById('status').textContent = '📍 Coördinaten bijgewerkt.';
    });

    return marker;
  }

  // Helper om popup te updaten
  function updatePopup(marker, m) {
    const content = `
      <strong>Missie ${m.order}</strong><br>
      <strong>Cryptisch:</strong> ${m.cryptic}<br>
      <strong>Opdracht:</strong> ${m.description}<br>
      <span style="font-family:monospace;">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
    `;
    marker.setPopupContent(content);
  }

  // ----- Lijst bijwerken (met bewerkbare velden) -----
  function updateCoordList() {
    const container = document.getElementById('coordContainer');
    let html = '';
    for (let i = 0; i < missions.length; i++) {
      const m = missions[i];
      html += `
        <div class="coord-item" data-index="${i}">
          <div class="coord-header">
            <span class="coord-id">#${m.order}</span>
            <span class="coord-coords">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
          </div>
          <label class="coord-label">🔐 Cryptische omschrijving</label>
          <textarea class="coord-textarea cryptic-input" rows="2">${m.cryptic}</textarea>
          <label class="coord-label">📋 Opdrachtbeschrijving</label>
          <textarea class="coord-textarea desc-input" rows="3">${m.description}</textarea>
        </div>
      `;
    }
    container.innerHTML = html;

    // Voeg event listeners toe aan de textarea's
    const items = container.querySelectorAll('.coord-item');
    items.forEach((item, index) => {
      const crypticTextarea = item.querySelector('.cryptic-input');
      const descTextarea = item.querySelector('.desc-input');
      const m = missions[index];

      crypticTextarea.addEventListener('input', function() {
        m.cryptic = this.value;
        updatePopup(markers[index], m);
        document.getElementById('status').textContent = '🔐 Cryptische tekst bijgewerkt.';
      });

      descTextarea.addEventListener('input', function() {
        m.description = this.value;
        updatePopup(markers[index], m);
        document.getElementById('status').textContent = '📋 Opdrachttekst bijgewerkt.';
      });
    });
  }

  // ----- JSON genereren (alle velden) -----
  function getJSON() {
    const data = missions.map(m => ({
      id: m.id,
      order: m.order,
      lat: m.lat,
      lng: m.lng,
      cryptic: m.cryptic,
      description: m.description
    }));
    return JSON.stringify(data, null, 2);
  }

  // ----- Copy button -----
  document.getElementById('copyBtn').addEventListener('click', async () => {
    const json = getJSON();
    try {
      await navigator.clipboard.writeText(json);
      document.getElementById('status').textContent = '✅ JSON gekopieerd naar klembord!';
    } catch (err) {
      // Fallback
      const textarea = document.createElement('textarea');
      textarea.value = json;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      document.getElementById('status').textContent = '✅ JSON gekopieerd!';
    }
  });

  // ----- Bouw markers en lijst -----
  for (let i = 0; i < missions.length; i++) {
    const m = missions[i];
    const marker = createMarker(m, i);
    markers.push(marker);
  }
  updateCoordList();
</script>
</body>
</html>
